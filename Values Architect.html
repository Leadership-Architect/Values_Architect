<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Executive Values Architect | v1.4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .serif { font-family: 'Playfair Display', serif; }
        .card { cursor: grab; background: #fff; border: 1px solid #e5e7eb; border-radius: 4px; padding: 10px; font-size: 0.85rem; transition: 0.2s; }
        .column { min-height: 480px; background: #f9fafb; border: 1px solid #edf2f7; border-radius: 8px; padding: 15px; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const VERSION = "1.4.0";
        const COPYRIGHT = "Copyright © 2026 Wong Tsien Loong. All Rights Reserved.";

        const VALUES_50 = [
            { id: 1, n: "Acceptance", d: "To be accepted exactly as I am", c: "Human" },
            { id: 2, n: "Accountability", d: "Taking full ownership of results and actions", c: "Driver" },
            { id: 3, n: "Achievement", d: "Fulfilling significant goals", c: "Driver" },
            { id: 4, n: "Evolution", d: "Embracing change, variety, and newness", c: "Vision" },
            { id: 5, n: "Altruism", d: "Selfless concern for others", c: "Human" },
            { id: 6, n: "Ambition", d: "Drive for success, rank, and status", c: "Driver" },
            { id: 7, n: "Authenticity", d: "Being true to one’s own character", c: "Self" },
            { id: 8, n: "Autonomy", d: "Independence and individual discretion", c: "Self" },
            { id: 9, n: "Balance", d: "Harmony between life demands", c: "Stability" },
            { id: 10, n: "Belonging", d: "Sense of being part of a community", c: "Human" },
            { id: 11, n: "Challenge", d: "Tasks that test my abilities", c: "Driver" },
            { id: 12, n: "Compassion", d: "Deep concern for others", c: "Human" },
            { id: 13, n: "Competence", d: "Mastery and skill in execution", c: "Driver" },
            { id: 14, n: "Contribution", d: "Making a lasting difference", c: "Vision" },
            { id: 15, n: "Courage", d: "Brave action in the face of fear", c: "Driver" },
            { id: 16, n: "Creativity", d: "Original ideas and imagination", c: "Vision" },
            { id: 17, n: "Curiosity", d: "Learning and seeking new things", c: "Vision" },
            { id: 18, n: "Decisiveness", d: "Firm and timely choices", c: "Driver" },
            { id: 19, n: "Diligence", d: "Thorough and conscientious effort", c: "Stability" },
            { id: 20, n: "Diversity", d: "Respecting individual differences", c: "Human" },
            { id: 21, n: "Duty", d: "Moral and professional obligations", c: "Stability" },
            { id: 22, n: "Ecology", d: "Harmony with the environment", c: "Vision" },
            { id: 23, n: "Excellence", d: "Relentless pursuit of optimal performance", c: "Driver" },
            { id: 24, n: "Fairness", d: "Justice and equal treatment", c: "Human" },
            { id: 25, n: "Principled Action", d: "Moral standards and integrity", c: "Self" },
            { id: 26, n: "Faith", d: "Belief in a higher purpose", c: "Self" },
            { id: 27, n: "Family", d: "Health and happiness of the home", c: "Human" },
            { id: 28, n: "Health", d: "Physical and mental well-being", c: "Self" },
            { id: 29, n: "Freedom", d: "Lack of undue restrictions", c: "Self" },
            { id: 30, n: "Friendship", d: "Close, supportive connections", c: "Human" },
            { id: 31, n: "Generosity", d: "Giving to assist others", c: "Human" },
            { id: 32, n: "Growth", d: "Continuous self-improvement", c: "Vision" },
            { id: 33, n: "Harmony", d: "Inner peace and conflict avoidance", c: "Stability" },
            { id: 34, n: "Humility", d: "Operating without ego", c: "Self" },
            { id: 35, n: "Humor", d: "Seeing the lighter side of life", c: "Human" },
            { id: 36, n: "Influence", d: "Control and impact over outcomes", c: "Driver" },
            { id: 37, n: "Innovation", d: "Developing new solutions", c: "Vision" },
            { id: 38, n: "Intelligence", d: "Keeping the mind sharp and analytical", c: "Vision" },
            { id: 39, n: "Justice", d: "Fair treatment for all", c: "Human" },
            { id: 40, n: "Knowledge", d: "Seeking deep understanding", c: "Vision" },
            { id: 41, n: "Leadership", d: "Inspiring and guiding others", c: "Driver" },
            { id: 42, n: "Legacy", d: "Long-term impact left behind", c: "Vision" },
            { id: 43, n: "Mindfulness", d: "Being present and conscious", c: "Self" },
            { id: 44, n: "Order", d: "Life that is well-organized", c: "Stability" },
            { id: 45, n: "Practicality", d: "Sensible and realistic solutions", c: "Stability" },
            { id: 46, n: "Recognition", d: "Validated and acknowledged by others", c: "Driver" },
            { id: 47, n: "Resilience", d: "Bouncing back from adversity", c: "Driver" },
            { id: 48, n: "Responsibility", d: "Ownership of duties", c: "Driver" },
            { id: 49, n: "Safety", d: "Security and protection from harm", c: "Stability" },
            { id: 50, n: "Wisdom", d: "Applying knowledge effectively", c: "Vision" }
        ];

        function App() {
            const [userName, setUserName] = useState("");
            const [lifeStage, setLifeStage] = useState("");
            const [state, setState] = useState({ deck: VALUES_50, core: [], important: [], noise: [] });
            const [top5, setTop5] = useState([]);
            const [view, setView] = useState('name');
            const [timestamp, setTimestamp] = useState("");

            const move = (item, from, to) => {
                const ns = { ...state };
                ns[from] = ns[from].filter(i => i.id !== item.id);
                ns[to] = [...ns[to], item].sort((a,b) => a.n.localeCompare(b.n));
                setState(ns);
            };

            const toggleTop5 = (item) => {
                if (top5.includes(item)) setTop5(top5.filter(i => i !== item));
                else if (top5.length < 5) setTop5([...top5, item]);
            };

            const generateReport = () => {
                const final5 = state.core.length === 5 ? state.core : top5;
                setTop5(final5);
                setTimestamp(new Date().toLocaleString('en-GB', { dateStyle: 'full', timeStyle: 'short' }));
                setView('debrief');
            };

            // ANALYTICAL NARRATIVE ENGINE (8 Sentences per Section)
            const getNorthStarAnalysis = () => {
                const names = top5.map(v => v.n);
                const counts = top5.reduce((acc, v) => { acc[v.c] = (acc[v.c] || 0) + 1; return acc; }, {});
                const primary = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                
                const s1 = `The identification of ${names.join(", ")} as your North Star reveals a leadership signature fundamentally built on ${primary.toLowerCase()} foundations. `;
                const s2 = `This headline suggests you are a leader who does not merely react to external stimuli, but instead anchors every strategic decision in a pre-defined moral and operational code. `;
                const s3 = `By placing ${names[0]} at the apex of your hierarchy, you have signaled to your system that you value depth and long-term structural integrity over short-term optical wins. `;
                const s4 = `This prioritization implies that your authority is derived from your convictions, which likely makes you a formidable and predictable presence in the boardroom. `;
                const s5 = `However, the intensity of your focus on ${names[1]} may inadvertently set a bar that others find difficult to reach without your specific internal wiring. `;
                const s6 = `Your narrative is one of clear intentionality, where performance is viewed as the inevitable outcome of adhering to these non-negotiables. `;
                const s7 = `As you navigate your current life stage, these five values act as the load-bearing joints of your character, supporting the weight of your executive responsibilities. `;
                const s8 = `Ultimately, your success depends on your ability to remain a 'human architect' who uses these values to build bridges, rather than just fortresses.`;
                return s1 + s2 + s3 + s4 + s5 + s6 + s7 + s8;
            };

            const getExileAnalysis = () => {
                const noise = state.noise;
                if (noise.length === 0) return "The assessment requires a complete sort to identify the Exile Zone.";
                
                const counts = noise.reduce((acc, v) => { acc[v.c] = (acc[v.c] || 0) + 1; return acc; }, {});
                const primaryExile = Object.keys(counts).sort((a,b) => counts[b] - counts[a])[0];
                const specificExiles = noise.filter(v => v.c === primaryExile).slice(0, 3).map(v => v.n);

                const profiles = {
                    Stability: `You have relegated **${specificExiles.join(", ")}** to the Noise pile, identifying you as an 'Unchecked Disrupter.' By exiling the mechanics of order and safety, you have prioritized speed and evolution at the expense of structural security. This suggests a leadership shadow that may be blind to the organizational anxiety created by your relentless pursuit of the new. While this makes you agile, it creates a system that lacks a 'grounding wire' during periods of high turbulence. In systemic terms, your exile of these traits is a declaration that you have outgrown the need for permission or predictability. However, you must ask if your team is currently starving for the very stability you have personally discarded. If your stakeholders value these exiles while you do not, you are creating a permanent state of friction. A mature leader eventually learns that the traits they exiled in their youth are often the ones required to sustain their legacy in the later stages of their career.`,
                    Human: `The rejection of **${specificExiles.join(", ")}** suggests a 'Clinical Commander' profile. You have optimized your leadership for cold-eyed performance by exiling the 'messiness' of human connection and compassion. This creates a high-output environment that is technically superior but potentially brittle, as it lacks the relational glue required to survive failure. By 'noising' these values, you have built a firewall between your mission and the emotions of those who execute it. You likely perceive these exiles as distractions to the 'real work,' yet they are the very elements that foster loyalty and resilience. Systemically, your system may feel efficient but cold, leading to high-level compliance but low-level commitment. You must consider if your absolute focus on achievement has left you with a team of 'functions' rather than 'people.' Without these exiled values, your leadership risk is one of isolation at the top.`,
                    Driver: `By exiling **${specificExiles.join(", ")}**, you have adopted the profile of a 'Self-Effacing Steward.' You have actively suppressed the mechanics of personal power, ambition, and recognition to serve a larger cause. While this is noble, it creates a leadership shadow where your influence may be too quiet to provide direction during a crisis. By 'noising' these assertive traits, you may inadvertently signal a lack of skin in the game or a reluctance to take a definitive stand. Your system may feel safe and collaborative, but it likely lacks the 'catalytic heat' required to break through major obstacles. You have exiled the ego, but you may have also exiled the decisiveness that the ego often fuels. A leader without these 'Driver' exiles can become a bystander to their own organization's inertia. The challenge is to reclaim enough of these discarded tools to ensure the ship has a visible hand at the helm.`,
                    Vision: `The exile of **${specificExiles.join(", ")}** reveals a 'Grounded Tactician.' You have effectively binned the lofty, the futuristic, and the evolutionary in favor of the immediate and the practical. This ensures that you hit your quarterly numbers with surgical precision, but it leaves you blind to the disruptive horizon. By 'noising' these visionary traits, you have signaled that you do not trust what you cannot measure or touch today. Your leadership shadow is one of strategic myopia, where you are brilliant at winning the battle but potentially losing the war. You have built a bridge to next week, but not to next decade. Systemically, your team likely feels secure in their current tasks but uncertain about their future relevance. You must ask: What happens to this structure when the environment shifts faster than your practical solutions can adapt?`,
                    Self: `Exiling **${specificExiles.join(", ")}** identifies you as an 'Institutional Ghost.' You have sacrificed the needs of the self—health, autonomy, and boundaries—on the altar of your professional mission. By 'noising' your own well-being, you are modeling a path of inevitable burnout for your entire system. You likely view these exiles as selfish or secondary, but they are actually the load-bearing supports of your long-term capability. Your leadership shadow is one of self-neglect, which ironically makes you a liability to the organization you are trying to save. Systemically, you are creating a culture where 'personhood' is viewed as an obstacle to 'progress.' If you continue to exile these traits, the system will eventually collapse because the architect has disintegrated. You must reclaim your own boundaries to ensure the mission remains sustainable.`
                };

                return profiles[primaryExile] || "The Radical Editor: You have distributed your exiles across categories, suggesting a leader who is currently in a state of deep transition, actively shedding an old skin to make room for a yet-to-be-defined future.";
            };

            const getSystemicAnalysis = () => {
                const coreVal = top5[2]?.n || "Core Value";
                const s1 = `The Systemic Lens identifies your commitment to **${coreVal}** as the primary ecological driver of your leadership. `;
                const s2 = `This value is not merely a personal preference; it is the atmospheric pressure that everyone in your system must breathe. `;
                const s3 = `It dictates what behaviors are rewarded, what failures are punished, and what truths are allowed to be spoken in your presence. `;
                const s4 = `While this provides your organization with a clear identity, it functions as a 'systemic tax' on those who do not share this specific internal wiring. `;
                const s5 = `Every stakeholder—from your board to your family—must adjust their own frequency to remain in alignment with your absolute focus on this principle. `;
                const s6 = `If your team were to perform a silent audit of your influence, they would identify this value as the bottleneck through which all their efforts must pass. `;
                const s7 = `The critical inquiry is whether your commitment to ${coreVal} is currently enabling the system's growth or slowly suffocating its diversity of thought. `;
                const s8 = `A mature leader recognizes that their greatest strength is often the very thing that prevents their system from evolving past them.`;
                return s1 + s2 + s3 + s4 + s5 + s6 + s7 + s8;
            };

            const getParadoxAnalysis = () => {
                const v1 = top5[0]?.n || "Priority A";
                const v2 = top5[1]?.n || "Priority B";
                const s1 = `The Paradox Lens illuminates the permanent structural tension between your pursuit of **${v1}** and **${v2}**. `;
                const s2 = `These are not complementary values; they are a fundamental polarity that creates a constant internal and external friction. `;
                const s3 = `In a crisis, you will inevitably be forced to choose which of these 'goods' to betray to save the other. `;
                const s4 = `Mature leadership is the capacity to hold this 'both/and' tension without collapsing into the comfort of a single preference. `;
                const s5 = `If you favor ${v1} too frequently, you become a rigid caricature of your own principles; if you favor ${v2}, you lose your strategic edge. `;
                const s6 = `The maturity of your leadership is found in the quality of the compromise you make between these two competing truths every day. `;
                const s7 = `You must ask yourself who in your system is currently caught in the crossfire of this unresolved tension. `;
                const s8 = `Your ongoing development lies in sustaining the discomfort of this paradox until a higher-order leadership solution eventually emerges.`;
                return s1 + s2 + s3 + s4 + s5 + s6 + s7 + s8;
            };

            return (
                <div className="max-w-6xl mx-auto p-8 flex flex-col min-h-screen">
                    <div className="flex-grow">
                    <header className="mb-8 border-b pb-4 flex justify-between items-end no-print">
                        <h1 className="serif text-3xl">Executive Values Architect</h1>
                        <p className="text-xs text-gray-400 uppercase tracking-widest font-bold italic">Audit v{VERSION}</p>
                    </header>

                    {view === 'name' && (
                        <div className="py-10 max-w-2xl mx-auto">
                            <section className="bg-gray-50 p-8 rounded-lg mb-10 border border-gray-100 shadow-sm">
                                <h3 className="serif text-2xl mb-4 border-b pb-2 italic text-gray-700">Conditions of Engagement</h3>
                                <ul className="space-y-4 text-sm text-gray-600 italic">
                                    <li className="flex gap-2"><span>1.</span> <strong>Total Sort Required:</strong> The forensic analysis remains locked until all 50 cards are assigned. Every data point matters.</li>
                                    <li className="flex gap-2"><span>2.</span> <strong>The Refinement:</strong> Your North Star is an exact five. If you choose more, you will be forced to eliminate.</li>
                                    <li className="flex gap-2"><span>3.</span> <strong>Holistic Sourcing:</strong> The report analyzes what you prioritize (Core), what you negotiate (Important), and what you exile (Noise).</li>
                                </ul>
                            </section>
                            <div className="text-center space-y-6">
                                <input type="text" className="w-full border-b-2 p-4 text-2xl text-center outline-none focus:border-black transition" placeholder="Leader Full Name" value={userName} onChange={e => setUserName(e.target.value)} />
                                <input type="text" className="w-full border-b-2 p-4 text-xl text-center outline-none focus:border-black transition" placeholder="Life Stage (e.g., 60s)" value={lifeStage} onChange={e => setLifeStage(e.target.value)} />
                                {userName.length > 2 && <button onClick={() => setView('sort')} className="mt-8 bg-black text-white px-12 py-3 rounded-full hover:bg-gray-800 transition shadow-xl">Begin Assessment</button>}
                            </div>
                        </div>
                    )}

                    {view === 'sort' && (
                        <div className="grid grid-cols-4 gap-6">
                            <div className="column">
                                <h3 className="font-bold mb-4 uppercase text-[10px] tracking-widest text-gray-400">The Deck ({state.deck.length})</h3>
                                <div className="space-y-2 max-h-[65vh] overflow-y-auto pr-2">
                                    {state.deck.map(i => (
                                        <div key={i.id} draggable onDragStart={e => e.dataTransfer.setData("d", JSON.stringify({i, f: 'deck'}))} className="card shadow-sm hover:border-black">
                                            <div className="font-bold">{i.n}</div>
                                            <div className="text-[10px] text-gray-400 mt-1 italic leading-tight">{i.d}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <DropCol title="Core" id="core" items={state.core} move={move} theme="border-blue-200" />
                            <DropCol title="Important" id="important" items={state.important} move={move} theme="border-gray-100" />
                            <DropCol title="Noise" id="noise" items={state.noise} move={move} theme="bg-gray-50 border-transparent opacity-80" />
                            {state.deck.length === 0 && (
                                <div className="fixed bottom-10 right-10">
                                    <button onClick={() => state.core.length === 5 ? generateReport() : setView('top5')} className="bg-blue-600 text-white px-10 py-4 rounded-full shadow-2xl animate-pulse font-bold">
                                        {state.core.length === 5 ? "Generate Report" : "Refine North Star"}
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {view === 'top5' && (
                        <div className="py-10 text-center">
                            <h2 className="serif text-4xl mb-10">Refine Your North Star (Pick 5)</h2>
                            <div className="flex flex-wrap justify-center gap-4 max-w-4xl mx-auto">
                                {state.core.map(i => (
                                    <div key={i.id} onClick={() => top5.includes(i) ? setTop5(top5.filter(x => x !== i)) : top5.length < 5 && setTop5([...top5, i])} 
                                         className={`p-6 border-2 rounded-xl cursor-pointer w-64 transition-all ${top5.includes(i) ? 'border-black bg-gray-100 shadow-inner scale-105' : 'border-gray-100 opacity-40 grayscale'}`}>
                                        <div className="font-bold text-lg mb-2">{i.n}</div>
                                        <div className="text-[11px] text-gray-500 leading-tight italic">{i.d}</div>
                                    </div>
                                ))}
                            </div>
                            {top5.length === 5 && <button onClick={generateReport} className="mt-16 bg-black text-white px-16 py-4 rounded-full text-xl shadow-xl">Finalize Report</button>}
                        </div>
                    )}

                    {view === 'debrief' && (
                        <div className="max-w-4xl mx-auto py-10 space-y-16">
                            <div className="border-b-4 border-black pb-4 flex justify-between items-end">
                                <div><h2 className="serif text-6xl">{userName}</h2><p className="text-xs text-gray-400 mt-2 font-bold uppercase tracking-widest">Stage: {lifeStage}</p></div>
                                <div className="text-right text-[10px] text-gray-400 font-bold uppercase">
                                    <p>{timestamp}</p>
                                    <p className="no-print mt-2 text-blue-600 cursor-pointer border-b border-blue-600 inline-block font-bold" onClick={() => window.print()}>EXPORT PDF</p>
                                </div>
                            </div>

                            {/* Section 1: North Star */}
                            <section className="bg-white p-10 border border-gray-100 shadow-sm rounded-lg">
                                <h3 className="serif text-3xl border-b-2 border-black pb-4 mb-8 uppercase tracking-widest">I. The North Star</h3>
                                <div className="grid grid-cols-5 gap-3 mb-10">
                                    {top5.map(v => <div key={v.id} className="bg-gray-50 p-4 border rounded text-center shadow-sm"><div className="font-bold text-[9px] uppercase text-gray-400 mb-1">{v.c}</div><div className="font-bold text-[11px] serif uppercase">{v.n}</div></div>)}
                                </div>
                                <p className="text-gray-700 leading-relaxed italic text-xl border-l-8 pl-8 border-gray-200">"{getNorthStarAnalysis()}"</p>
                            </section>

                            {/* Section 2: Exile Zone */}
                            <section className="bg-zinc-900 text-zinc-100 p-10 shadow-2xl rounded-lg">
                                <h3 className="serif text-3xl border-b-2 border-zinc-700 pb-4 mb-8 uppercase tracking-widest text-white">II. The Exile Zone</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="border-l-4 pl-6 border-zinc-600 italic text-zinc-300 text-lg leading-relaxed">
                                        "{getExileAnalysis()}"
                                    </div>
                                    <div className="bg-zinc-800 p-8 rounded-lg border border-zinc-700">
                                        <p className="text-white font-bold mb-4 uppercase text-[10px] tracking-widest italic">Shadow Indicators (Noise Pile):</p>
                                        <div className="flex flex-wrap gap-2 mb-6">
                                            {state.noise.slice(0, 10).map(v => <span key={v.id} className="text-[10px] bg-zinc-700 px-2 py-1 rounded text-zinc-400">{v.n}</span>)}
                                        </div>
                                        <p className="text-zinc-500 text-sm leading-relaxed italic">
                                            "A crisis typically forces a system back into its shadow. Will your team naturally revert to what you have discarded, or have you built a structure that can truly sustain your new path?"
                                        </p>
                                    </div>
                                </div>
                            </section>

                            {/* Section 3: Systemic Lens */}
                            <section className="bg-white p-10 border-l-8 border-indigo-600 shadow-sm rounded-lg">
                                <h3 className="serif text-3xl border-b-2 border-indigo-100 pb-4 mb-8 uppercase tracking-widest text-indigo-900">III. The Systemic Lens</h3>
                                <div className="mb-6 flex gap-2">
                                    <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest italic">Evaluating Ecological Driver: {top5[2]?.n}</span>
                                </div>
                                <p className="text-gray-600 text-xl leading-relaxed mb-8 italic border-l-4 pl-6 border-indigo-200">"{getSystemicAnalysis()}"</p>
                                <div className="bg-indigo-50 p-8 rounded-lg border border-indigo-100">
                                    <p className="text-indigo-900 font-bold mb-2 uppercase text-[10px] tracking-widest italic">The Ecological Stress Test</p>
                                    <p className="text-indigo-800 text-sm leading-relaxed italic">
                                        Identify who in your system is currently paying the highest price for your convictions. Is your commitment to excellence facilitating the team's growth, or is it acting as a silent bottleneck?
                                    </p>
                                </div>
                            </section>

                            {/* Section 4: Paradox Lens */}
                            <section className="bg-white p-10 border-l-8 border-emerald-600 shadow-sm rounded-lg">
                                <h3 className="serif text-3xl border-b-2 border-emerald-100 pb-4 mb-8 uppercase tracking-widest text-emerald-900">IV. The Paradox Lens</h3>
                                <div className="mb-6 flex gap-2">
                                    <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest italic">Analyzing Tension: {top5[0]?.n} vs {top5[1]?.n}</span>
                                </div>
                                <p className="text-gray-600 text-xl leading-relaxed mb-8 italic border-l-4 pl-6 border-emerald-200">"{getParadoxAnalysis()}"</p>
                                <div className="bg-emerald-50 p-8 rounded-lg border border-emerald-100">
                                    <p className="text-emerald-900 font-bold mb-2 uppercase text-[10px] tracking-widest italic">The Polarity Challenge</p>
                                    <p className="text-emerald-800 text-sm leading-relaxed italic italic">
                                        Maturity lies in the quality of the compromise you make between competing truths. Are you currently choosing your favorite value at the expense of the systemic truth of your situation?
                                    </p>
                                </div>
                            </section>

                            {/* Reflection Inquiries */}
                            <section className="bg-black text-white p-12 rounded-lg shadow-2xl no-print">
                                <h3 className="serif text-4xl mb-10 border-b border-gray-700 pb-6 text-center">Systemic Inquiries</h3>
                                <ul className="space-y-10 text-lg italic text-gray-400 max-w-2xl mx-auto">
                                    <li className="flex gap-6 leading-relaxed"><span className="text-white font-bold not-italic text-2xl">1.</span> Which of these five values is currently "over-serving" your ego but "under-serving" the collective goal of your system?</li>
                                    <li className="flex gap-6 leading-relaxed"><span className="text-white font-bold not-italic text-2xl">2.</span> If you were required to sacrifice one North Star value to save your organization from collapse, which dies first? What does that reveal about its true priority?</li>
                                    <li className="flex gap-6 leading-relaxed"><span className="text-white font-bold not-italic text-2xl">3.</span> What environmental conditions allow all five of these values to exist in alignment rather than in conflict?</li>
                                </ul>
                            </section>
                        </div>
                    )}
                    </div>
                    
                    <footer className="mt-20 border-t pt-8 pb-12 flex justify-between items-center text-[10px] text-gray-400 uppercase tracking-widest">
                        <div className="font-bold">{COPYRIGHT}</div>
                        <div className="italic uppercase tracking-widest">SYSTEMIC VALUES ARCHITECT | v{VERSION}</div>
                    </footer>
                </div>
            );
        }

        function DropCol({ title, items, move, id, theme }) {
            return (
                <div className={`column ${theme}`} onDragOver={e => e.preventDefault()} onDrop={e => {const d = JSON.parse(e.dataTransfer.getData("d")); move(d.i, d.f, id)}}>
                    <h3 className="font-bold mb-4 flex justify-between uppercase text-[10px] tracking-widest">{title} <span className="text-gray-400 font-normal">{items.length}</span></h3>
                    <div className="space-y-2">
                        {items.map(i => (
                            <div key={i.id} draggable onDragStart={e => e.dataTransfer.setData("d", JSON.stringify({i, f: id}))} className="card shadow-sm hover:border-black transition-colors">
                                <div className="font-bold text-zinc-800">{i.n}</div>
                                <div className="text-[9px] text-gray-400 leading-tight mt-1 italic">{i.d}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
